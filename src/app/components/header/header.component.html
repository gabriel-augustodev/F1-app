<header
  class="bg-gradient-to-r from-gray-900 to-black text-white shadow-lg sticky top-0 z-50"
>
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <!-- Logo e Título -->
      <div class="flex items-center gap-3 group">
        <div class="relative">
          <img
            src="assets/logo-f1.png"
            alt="F1 Logo"
            class="w-10 h-10 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3"
          />
          <div
            class="absolute inset-0 bg-red-600 rounded-full blur-md opacity-0 group-hover:opacity-30 transition-opacity"
          ></div>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight">
            <span class="text-white">Fórmula 1</span>
            <span class="text-red-500 ml-1">App</span>
          </h1>
          <p class="text-xs text-gray-400 hidden sm:block">
            Temporada {{ currentYear }}
          </p>
        </div>
      </div>

      <!-- Botão Mobile com animação -->
      <button
        class="md:hidden relative w-10 h-10 flex items-center justify-center"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuAberto"
      >
        <div class="relative w-6 h-5">
          <span
            class="absolute w-6 h-0.5 bg-white rounded-full transition-all duration-300"
            [ngClass]="menuAberto ? 'rotate-45 top-2' : 'rotate-0 top-0'"
          ></span>
          <span
            class="absolute w-6 h-0.5 bg-white rounded-full transition-all duration-300 top-2"
            [ngClass]="menuAberto ? 'opacity-0' : 'opacity-100'"
          ></span>
          <span
            class="absolute w-6 h-0.5 bg-white rounded-full transition-all duration-300"
            [ngClass]="menuAberto ? '-rotate-45 top-2' : 'rotate-0 top-4'"
          ></span>
        </div>
      </button>

      <!-- Navegação Desktop -->
      <nav class="hidden md:flex items-center gap-1">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.path"
          routerLinkActive="text-red-500 bg-white/10"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          class="relative px-4 py-2 rounded-lg font-medium transition-all duration-200 hover:text-red-500 group overflow-hidden"
        >
          <span class="relative z-10">{{ item.label }}</span>
          <span
            class="absolute inset-0 bg-red-600/10 scale-0 group-hover:scale-100 transition-transform duration-300 rounded-lg"
          ></span>
          <span
            class="absolute bottom-0 left-0 w-full h-0.5 bg-red-500 scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-left"
          ></span>
        </a>
      </nav>
    </div>

    <!-- Menu Mobile Melhorado -->
    <div
      *ngIf="menuAberto"
      class="md:hidden fixed inset-x-0 top-16 bg-gray-900 border-t border-gray-800 shadow-xl animate-slideDown"
    >
      <nav class="container mx-auto px-4 py-4 flex flex-col gap-2">
        <a
          *ngFor="let item of menuItems; let last = last"
          [routerLink]="item.path"
          routerLinkActive="bg-red-600 text-white"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          (click)="menuAberto = false"
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800 group"
        >
          <span class="text-xl">{{ item.icon }}</span>
          <span class="font-medium">{{ item.label }}</span>
          <span
            class="ml-auto text-gray-400 group-hover:translate-x-1 transition-transform"
            >→</span
          >
        </a>

        <!-- Informação da temporada no mobile -->
        <div class="mt-4 pt-4 border-t border-gray-800 text-sm text-gray-400">
          <div class="flex justify-between items-center px-4">
            <span>Temporada {{ currentYear }}</span>
            <span class="text-red-400">{{ statsText }}</span>
          </div>
        </div>
      </nav>
    </div>
  </div>

  <!-- Barra de progresso da temporada (opcional) -->
  <div class="h-1 bg-gray-800">
    <div
      class="h-full bg-gradient-to-r from-red-600 to-red-400 transition-all duration-500"
      [style.width.%]="seasonProgress"
    ></div>
  </div>
</header>

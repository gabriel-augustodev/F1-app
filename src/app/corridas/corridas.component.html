<div class="p-6">
    <h1 class="text-3xl font-bold text-white mb-6 text-center">Corridas da Temporada</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <div *ngFor="let corrida of corridas" class="bg-gray-900 text-white rounded-lg p-4 shadow-lg">
            <div class="flex items-center gap-2 mb-2">
                <img [src]="getFlagUrl(corrida.Circuit.Location.country)" alt="Bandeira" class="w-6 h-4 rounded-sm" />
                <h2 class="text-lg font-semibold">{{ corrida.raceName }}</h2>
            </div>
            <p class="text-sm text-gray-400">Local: {{ corrida.Circuit.Location.locality }}, {{ corrida.Circuit.Location.country }}</p>
            <p class="text-sm text-gray-400">Data: {{ corrida.date | date:'dd/MM/yyyy' }}</p>
        </div>
    </div>
</div>
